<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Card Benzină">
<title>Card Benzină</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inconsolata:wght@300;400;500;600&display=swap');

:root {
  --bg: #0a0e0f;
  --card: #111618;
  --card2: #161d1f;
  --border: #1e2a2d;
  --border2: #253035;
  --fuel: #00c4a0;
  --fuel-dim: rgba(0,196,160,0.12);
  --fuel-glow: rgba(0,196,160,0.25);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --text: #e8f0f2;
  --muted: #5a7278;
  --muted2: #3a5258;
  --r: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100dvh;
  padding-bottom: calc(env(safe-area-inset-bottom,0px) + 80px);
}

/* ── TOP CARD ── */
.hero {
  background: linear-gradient(135deg, #0d1f1c 0%, #0a1a22 100%);
  border-bottom: 1px solid var(--border);
  padding: 52px 24px 28px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content:'';
  position:absolute; inset:0;
  background: radial-gradient(ellipse 60% 80% at 90% -10%, var(--fuel-glow) 0%, transparent 60%);
}
.hero-label {
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.hero-balance {
  font-size: 3.4rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  color: var(--fuel);
  text-shadow: 0 0 40px var(--fuel-glow);
  font-variant-numeric: tabular-nums;
}
.hero-balance span { font-size: 1.4rem; font-weight: 400; color: var(--muted); margin-left: 4px; }

.hero-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-top: 20px;
}
.hstat {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
}
.hstat-label { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.hstat-val { font-family: 'Inconsolata', monospace; font-size: 1rem; font-weight: 600; color: var(--text); }
.hstat-val.green { color: var(--fuel); }
.hstat-val.amber { color: var(--amber); }

/* ── PROGRESS BAR ── */
.prog-wrap {
  height: 3px;
  background: var(--border);
  position: relative;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--fuel), #00e5c0);
  transition: width 0.7s cubic-bezier(.16,1,.3,1);
  box-shadow: 0 0 8px var(--fuel);
}

/* ── NAV TABS ── */
.nav {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.nav-btn {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 14px 8px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.nav-btn.active {
  color: var(--fuel);
  border-bottom-color: var(--fuel);
}

/* ── SECTIONS ── */
.section { padding: 20px; display: none; }
.section.active { display: block; }

/* ── FORM ── */
.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
  display: block;
}
.form-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Inconsolata', monospace;
  font-size: 1.05rem;
  font-weight: 500;
  padding: 13px 14px;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input:focus {
  border-color: var(--fuel);
  box-shadow: 0 0 0 3px var(--fuel-dim);
}
.form-input::placeholder { color: var(--muted2); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Calculated display */
.calc-box {
  background: var(--fuel-dim);
  border: 1px solid rgba(0,196,160,0.2);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.calc-box-label { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fuel); opacity: 0.7; }
.calc-box-val { font-family: 'Inconsolata', monospace; font-size: 1.3rem; font-weight: 600; color: var(--fuel); }

.btn {
  width: 100%;
  border: none;
  border-radius: 12px;
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 15px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-fuel { background: var(--fuel); color: #0a0e0f; }
.btn-set { background: var(--amber); color: #0a0e0f; margin-top: 10px; }

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 24px 0;
}

/* ── HISTORY ── */
.hist-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 10px;
  animation: fadeUp 0.3s cubic-bezier(.16,1,.3,1);
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}
.hist-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.hist-station {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text);
}
.hist-date {
  font-size: 0.72rem;
  color: var(--muted);
  font-family: 'Inconsolata', monospace;
  margin-top: 2px;
}
.hist-cost {
  font-family: 'Inconsolata', monospace;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--red);
  text-align: right;
}
.hist-balance-after {
  font-size: 0.68rem;
  color: var(--muted);
  text-align: right;
  margin-top: 1px;
}
.hist-pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.pill {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-family: 'Inconsolata', monospace;
  font-size: 0.78rem;
  color: var(--muted);
}
.pill strong { color: var(--fuel); font-weight: 600; }

.empty {
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
  padding: 48px 20px;
  line-height: 1.8;
}
.empty-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.4; }

.hist-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.hist-header-title {
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.clear-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.clear-btn:hover { border-color: var(--red); color: var(--red); }

/* ── CHART ── */
.chart-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 16px;
}
.chart-title {
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}
canvas { width: 100% !important; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom,0px) + 24px);
  left: 50%; transform: translateX(-50%) translateY(60px);
  background: var(--card2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 11px 22px;
  border-radius: 100px;
  font-size: 0.82rem;
  font-weight: 600;
  white-space: nowrap;
  transition: transform 0.35s cubic-bezier(.16,1,.3,1);
  z-index: 999;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  letter-spacing: 0.02em;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── iOS install hint ── */
.install-hint {
  background: var(--amber-dim);
  border: 1px solid rgba(245,158,11,0.2);
  border-radius: 10px;
  padding: 13px 16px;
  margin-bottom: 16px;
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.6;
}
.install-hint strong { color: var(--amber); display:block; margin-bottom:3px; font-size:0.8rem; }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-label">Sold disponibil</div>
  <div class="hero-balance" id="hero-bal">0<span>lei</span></div>
  <div class="hero-stats">
    <div class="hstat">
      <div class="hstat-label">Inițial</div>
      <div class="hstat-val green" id="stat-init">—</div>
    </div>
    <div class="hstat">
      <div class="hstat-label">Cheltuit</div>
      <div class="hstat-val amber" id="stat-spent">0 lei</div>
    </div>
    <div class="hstat">
      <div class="hstat-label">Litri total</div>
      <div class="hstat-val" id="stat-litri">0 L</div>
    </div>
  </div>
</div>
<div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:100%"></div></div>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="switchTab('add')">⛽ Alimentare</button>
  <button class="nav-btn" onclick="switchTab('history')">📋 Istoric</button>
  <button class="nav-btn" onclick="switchTab('chart')">📈 Grafic</button>
  <button class="nav-btn" onclick="switchTab('settings')">⚙️ Card</button>
</div>

<!-- TAB: ADD -->
<div class="section active" id="tab-add">

  <div id="install-hint-wrap" style="display:none">
    <div class="install-hint">
      <strong>📲 Salvează pe iPhone</strong>
      Safari → buton Distribuie → „Adaugă la ecranul principal"
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Data</label>
      <input class="form-input" id="f-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Preț/litru (lei)</label>
      <input class="form-input" id="f-price" type="text" inputmode="decimal" placeholder="ex: 6,89" oninput="calcTotal()">
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Litri alimentați</label>
    <input class="form-input" id="f-liters" type="text" inputmode="decimal" placeholder="ex: 45,50" oninput="calcTotal()">
  </div>

  <div class="calc-box" id="calc-box" style="display:none">
    <div>
      <div class="calc-box-label">Total de plată</div>
    </div>
    <div class="calc-box-val" id="calc-total">0,00 lei</div>
  </div>

  <button class="btn btn-fuel" onclick="doAdd()">✓ Înregistrează alimentarea</button>

  <hr class="divider">

  <div class="form-group">
    <label class="form-label">Sau adaugă o sumă manual (lei)</label>
    <input class="form-input" id="f-manual" type="text" inputmode="decimal" placeholder="ex: 439,66">
  </div>
  <button class="btn btn-fuel" onclick="doManual()">✓ Adaugă alimentare (sumă directă)</button>
</div>

<!-- TAB: HISTORY -->
<div class="section" id="tab-history">
  <div class="hist-header">
    <div class="hist-header-title">Toate alimentările</div>
    <button class="clear-btn" onclick="clearHistory()">Șterge tot</button>
  </div>
  <div id="history-list"></div>
</div>

<!-- TAB: CHART -->
<div class="section" id="tab-chart">
  <div class="chart-wrap">
    <div class="chart-title">Evoluție sold (lei)</div>
    <canvas id="chart-balance" height="200"></canvas>
  </div>
  <div class="chart-wrap">
    <div class="chart-title">Cheltuieli per alimentare (lei)</div>
    <canvas id="chart-spent" height="200"></canvas>
  </div>
</div>

<!-- TAB: SETTINGS -->
<div class="section" id="tab-settings">
  <div class="form-group">
    <label class="form-label">Sold inițial card (lei)</label>
    <input class="form-input" id="s-balance" type="text" inputmode="decimal" placeholder="ex: 10000">
  </div>
  <button class="btn btn-set" onclick="doSetBalance()">Setează soldul cardului</button>

  <hr class="divider">

  <div class="form-group">
    <label class="form-label">Adaugă fonduri pe card (lei)</label>
    <input class="form-input" id="s-topup" type="text" inputmode="decimal" placeholder="ex: 5000">
  </div>
  <button class="btn btn-fuel" onclick="doTopup()">+ Reîncarcă cardul</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── STATE ──
let S = { balance: 0, initialBalance: null, totalSpent: 0, totalLiters: 0, history: [] };

function load() {
  try { const d = localStorage.getItem('benzinaCard_v3'); if(d) S = JSON.parse(d); } catch(e){}
}
function save() {
  try { localStorage.setItem('benzinaCard_v3', JSON.stringify(S)); } catch(e){}
}

// ── PARSE number (supports , and .) ──
function parseNum(str) {
  if (!str) return NaN;
  // replace comma with dot, remove spaces
  return parseFloat(String(str).replace(/\s/g,'').replace(',','.'));
}
function fmt(n, dec=2) {
  return n.toLocaleString('ro-RO', {minimumFractionDigits: dec, maximumFractionDigits: dec});
}

// ── CALC TOTAL ──
function calcTotal() {
  const price = parseNum(document.getElementById('f-price').value);
  const liters = parseNum(document.getElementById('f-liters').value);
  const box = document.getElementById('calc-box');
  if (price > 0 && liters > 0) {
    const total = price * liters;
    document.getElementById('calc-total').textContent = fmt(total) + ' lei';
    box.style.display = 'flex';
  } else {
    box.style.display = 'none';
  }
}

// ── ADD (calculated from liters + price) ──
function doAdd() {
  const station = 'Alimentare';
  const dateVal = document.getElementById('f-date').value;
  const price = parseNum(document.getElementById('f-price').value);
  const liters = parseNum(document.getElementById('f-liters').value);

  if (!liters || liters <= 0) { toast('Introdu numărul de litri'); return; }
  if (!price || price <= 0) { toast('Introdu prețul per litru'); return; }

  const total = +(price * liters).toFixed(2);
  if (total > S.balance) { toast('⚠️ Suma depășește soldul!'); return; }

  const dateDisplay = dateVal ? formatDate(dateVal) : formatDate(todayStr());

  S.balance = +(S.balance - total).toFixed(2);
  S.totalSpent = +(S.totalSpent + total).toFixed(2);
  S.totalLiters = +(S.totalLiters + liters).toFixed(2);
  S.history.push({ station, date: dateDisplay, liters, pricePerL: price, total, balance: S.balance, type: 'fuel' });

  clearFuelForm();
  save(); render();
  toast('⛽ −' + fmt(total) + ' lei înregistrat');
}

// ── MANUAL SUM ──
function doManual() {
  const total = parseNum(document.getElementById('f-manual').value);
  const note = 'Alimentare';
  if (!total || total <= 0) { toast('Introdu suma'); return; }
  if (total > S.balance) { toast('⚠️ Suma depășește soldul!'); return; }

  S.balance = +(S.balance - total).toFixed(2);
  S.totalSpent = +(S.totalSpent + total).toFixed(2);
  S.history.push({ station: note, date: formatDate(todayStr()), liters: null, pricePerL: null, total, balance: S.balance, type: 'manual' });

  document.getElementById('f-manual').value = '';
  document.getElementById('f-manual-note').value = '';
  save(); render();
  toast('−' + fmt(total) + ' lei înregistrat');
}

function doSetBalance() {
  const val = parseNum(document.getElementById('s-balance').value);
  if (!val || val <= 0) { toast('Introdu o sumă validă'); return; }
  S.balance = val;
  S.initialBalance = val;
  S.totalSpent = 0;
  S.totalLiters = 0;
  S.history = [];
  document.getElementById('s-balance').value = '';
  save(); render();
  toast('Card setat la ' + fmt(val) + ' lei');
}

function doTopup() {
  const val = parseNum(document.getElementById('s-topup').value);
  if (!val || val <= 0) { toast('Introdu o sumă validă'); return; }
  S.balance = +(S.balance + val).toFixed(2);
  if (S.initialBalance !== null) S.initialBalance = +(S.initialBalance + val).toFixed(2);
  S.history.push({ station: 'Reîncărcare card', date: formatDate(todayStr()), liters: null, pricePerL: null, total: -val, balance: S.balance, type: 'topup' });
  document.getElementById('s-topup').value = '';
  save(); render();
  toast('+' + fmt(val) + ' lei adăugat pe card');
}

function clearHistory() {
  if (!confirm('Ștergi tot istoricul? Soldul rămâne.')) return;
  S.history = [];
  S.totalSpent = 0;
  S.totalLiters = 0;
  save(); render();
  toast('Istoric șters');
}

function clearFuelForm() {
  ['f-price','f-liters'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('calc-box').style.display = 'none';
  // reset date to today
  document.getElementById('f-date').value = todayStr();
}

// ── RENDER ──
function render() {
  // Hero
  document.getElementById('hero-bal').innerHTML = fmt(S.balance) + '<span>lei</span>';
  document.getElementById('stat-init').textContent = S.initialBalance !== null ? fmt(S.initialBalance) + ' lei' : '—';
  document.getElementById('stat-spent').textContent = fmt(S.totalSpent) + ' lei';
  document.getElementById('stat-litri').textContent = fmt(S.totalLiters, 1) + ' L';

  // Progress
  const pct = S.initialBalance ? Math.max(0, Math.min(100, S.balance / S.initialBalance * 100)) : 100;
  const bar = document.getElementById('prog-fill');
  bar.style.width = pct + '%';
  bar.style.background = pct > 50 ? 'linear-gradient(90deg,var(--fuel),#00e5c0)'
    : pct > 25 ? 'linear-gradient(90deg,var(--amber),#fbbf24)'
    : 'linear-gradient(90deg,var(--red),#f87171)';

  renderHistory();
  renderCharts();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  const items = [...S.history].reverse().filter(h => h.type !== 'topup');
  if (!items.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⛽</div>Nicio alimentare înregistrată.<br>Adaugă prima ta reumplere!</div>';
    return;
  }
  el.innerHTML = items.map(h => {
    const isTopup = h.type === 'topup';
    const costStr = isTopup ? '+' + fmt(-h.total) + ' lei' : '−' + fmt(h.total) + ' lei';
    const costClass = isTopup ? 'green' : '';
    let pills = '';
    if (h.liters) pills += `<div class="pill"><strong>${fmt(h.liters,2)} L</strong></div>`;
    if (h.pricePerL) pills += `<div class="pill">${fmt(h.pricePerL,2)} lei/L</div>`;
    pills += `<div class="pill">Sold: <strong>${fmt(h.balance)} lei</strong></div>`;
    return `
    <div class="hist-item">
      <div class="hist-top">
        <div>
          <div class="hist-station">${h.station}</div>
          <div class="hist-date">${h.date}</div>
        </div>
        <div>
          <div class="hist-cost" style="color:${isTopup?'var(--fuel)':'var(--red)'}">${costStr}</div>
        </div>
      </div>
      <div class="hist-pills">${pills}</div>
    </div>`;
  }).join('');
}

// ── CHARTS ──
let chartBalance = null, chartSpent = null;

function renderCharts() {
  const fuels = S.history.filter(h => h.type !== 'topup');
  if (!fuels.length) {
    if (chartBalance) { chartBalance.destroy(); chartBalance = null; }
    if (chartSpent) { chartSpent.destroy(); chartSpent = null; }
    return;
  }

  const labels = fuels.map(h => h.date.split(' ')[0]);
  const balances = fuels.map(h => h.balance);
  const costs = fuels.map(h => h.total);

  const cfg = {
    responsive: true,
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: '#161d1f',
      borderColor: '#1e2a2d',
      borderWidth: 1,
      titleColor: '#5a7278',
      bodyColor: '#e8f0f2',
      callbacks: {
        label: ctx => ' ' + fmt(ctx.parsed.y) + ' lei'
      }
    }},
    scales: {
      x: { grid: { color: '#1e2a2d' }, ticks: { color: '#5a7278', font: { size: 10, family: 'Inconsolata' } } },
      y: { grid: { color: '#1e2a2d' }, ticks: { color: '#5a7278', font: { size: 10, family: 'Inconsolata' }, callback: v => fmt(v,0) } }
    }
  };

  // Balance chart
  if (chartBalance) chartBalance.destroy();
  chartBalance = new Chart(document.getElementById('chart-balance'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: balances,
        borderColor: '#00c4a0',
        backgroundColor: 'rgba(0,196,160,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#00c4a0',
        pointRadius: 4,
        fill: true,
        tension: 0.35
      }]
    },
    options: cfg
  });

  // Spent per fill chart
  if (chartSpent) chartSpent.destroy();
  chartSpent = new Chart(document.getElementById('chart-spent'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: costs,
        backgroundColor: 'rgba(239,68,68,0.55)',
        borderColor: '#ef4444',
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: { ...cfg }
  });
}

// ── UTILS ──
function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}
function formatDate(iso) {
  const [y,m,day] = iso.split('-');
  const months = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];
  return `${day} ${months[+m-1]} ${y}`;
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── TABS ──
function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'chart') renderCharts();
}

// ── INIT ──
load();
document.getElementById('f-date').value = todayStr();

// iOS install hint
if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone) {
  document.getElementById('install-hint-wrap').style.display = 'block';
}

render();
</script>
